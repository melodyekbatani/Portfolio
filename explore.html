<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ─── Explore: scattered constellation canvas ────────── */
    :root {
      --explore-meta: #9a9a9a;
    }

    body.explore-page {
      overflow: hidden;
      height: 100vh;
      background-color: var(--bg, #ffffff);  /* matches other pages, revealed during exit slide */
      color: #f4f4f4;
    }

    body.explore-page nav {
      background-color: transparent;
      box-shadow: none;
      /* Nav doesn't move during the slide; its text auto-inverts as the
         black panel passes under it (mix-blend-mode: difference). */
      mix-blend-mode: difference;
    }
    body.explore-page nav a { color: #ffffff; }

    /* Mobile burger lives outside <nav>, so the blend-mode doesn't reach
       it. Paint its lines white on the black explore bg. */
    body.explore-page .nav-burger span { background: #ffffff; }

    /* Full-viewport black surface that slides with the content — body bg
       stays neutral, so the slide-down actually reveals the underlying
       page color instead of snapping at navigation time. */
    .explore-bg {
      position: fixed;
      inset: 0;
      background: #000000;
      z-index: 0;            /* sits above body bg, below content */
      will-change: transform;
    }

    /* Slide-up entrance — black panel + canvas + chrome rise from below */
    @keyframes exploreSlideUp {
      from { transform: translate3d(0, 105%, 0); }
      to   { transform: translate3d(0, 0, 0); }
    }
    @keyframes exploreSlideDown {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(0, 105%, 0); }
    }
    .explore-bg,
    .explore-stage,
    .explore-meta,
    .explore-hint {
      animation: exploreSlideUp 1500ms cubic-bezier(0.22, 1, 0.36, 1) both;
      will-change: transform;
    }
    body.is-exiting .explore-bg,
    body.is-exiting .explore-stage,
    body.is-exiting .explore-meta,
    body.is-exiting .explore-hint {
      animation: exploreSlideDown 1300ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    body.explore-page nav a { color: #f4f4f4; }
    body.explore-page nav .nav-indicator { background: #f4f4f4; }

    .explore-stage {
      position: fixed;
      inset: 0;
      cursor: default;
      user-select: none;
      z-index: 0;
      overflow: hidden;
    }

    .explore-world {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      will-change: transform;
    }

    /* Big faded title at the center of the canvas — pans with the world */
    .explore-title {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.0;
      color: #f4f4f4;
      pointer-events: none;
      white-space: nowrap;
      z-index: 5; /* mid-stack — some thumbs go above, some below */
    }
    .explore-title .line-1 {
      display: block;
      font-size: clamp(36px, 5vw, 56px);
    }
    .explore-title .line-2 {
      display: block;
      font-size: clamp(28px, 4vw, 44px);
      opacity: 0.85;
      margin-top: 4px;
    }

    /* Individual scattered thumbnails */
    .explore-thumb {
      position: absolute;
      cursor: pointer;
      transform: var(--base-transform);
      transition: filter 320ms ease;
      will-change: transform;
    }
    .explore-thumb:hover {
      z-index: 200;
      filter: drop-shadow(0 12px 36px rgba(0,0,0,0.45));
    }

    .explore-thumb-media {
      display: block;
      overflow: hidden;
      transform-origin: center;
      transition: transform 620ms cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform;
    }
    .explore-thumb:hover .explore-thumb-media {
      transform: scale(3.2);
    }

    /* Meta block content swaps smoothly on hover */
    .explore-meta h1,
    .explore-meta p,
    .explore-meta .cta {
      transition: opacity 220ms ease;
    }
    .explore-meta .cta {
      display: inline-block;
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f4f4f4;
      border-bottom: 1px solid #f4f4f4;
      padding-bottom: 1px;
      cursor: pointer;
      pointer-events: auto;
    }
    .explore-meta .cta:hover { opacity: 0.7; }
    .explore-thumb-media img,
    .explore-thumb-media video {
      display: block;
      width: 100%;
      height: auto;        /* keep natural aspect, no crop */
      object-fit: contain;
    }

    /* page chrome */
    .explore-meta {
      position: fixed;
      left: clamp(24px, 4vw, 56px);
      bottom: clamp(28px, 5vh, 56px);
      max-width: 320px;
      z-index: 3;
      pointer-events: none;
    }
    .explore-meta h1 {
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      color: #f4f4f4;
    }
    .explore-meta p {
      font-size: 13px;
      line-height: 1.55;
      color: var(--explore-meta);
    }

    .explore-hint {
      position: fixed;
      right: clamp(24px, 4vw, 56px);
      bottom: clamp(28px, 5vh, 56px);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--explore-meta);
      z-index: 3;
      pointer-events: none;
      display: flex; align-items: center; gap: 10px;
      opacity: 0.8;
    }
    .explore-hint .dot {
      width: 5px; height: 5px; border-radius: 50%; background: #f4f4f4;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.25; transform: scale(1); }
      50%     { opacity: 0.9; transform: scale(1.6); }
    }

    /* nav above canvas */
    nav { z-index: 4; }

    /* ─── Modal: shows a full project's images at large size ─── */
    .explore-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;          /* above nav + everything else */
      background: #000000;
      color: #f4f4f4;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms ease, visibility 0s linear 220ms;
    }
    .explore-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 220ms ease, visibility 0s linear 0s;
    }

    .explore-modal-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(40px, 6vh, 80px) clamp(80px, 10vw, 160px);
    }

    .explore-modal-media {
      max-width: 100%;
      max-height: 100%;
      display: grid;
      place-items: center;
      transform: translateY(8px);
      transition: transform 280ms cubic-bezier(.2,.7,.2,1);
    }
    .explore-modal.is-open .explore-modal-media { transform: translateY(0); }

    .explore-modal-media img,
    .explore-modal-media video {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 200px);
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .explore-modal-topnav {
      position: absolute;
      top: 28px;
      right: clamp(24px, 4vw, 56px);
      display: flex;
      gap: 28px;
      align-items: center;
      font-size: 14px;
      color: #f4f4f4;
      z-index: 5;          /* above the media stage inside the modal */
    }
    .explore-modal-topnav button,
    .explore-modal-topnav a {
      background: transparent;
      border: 0;
      padding: 8px 4px;     /* larger hit target */
      margin: 0;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      color: #f4f4f4;
      transition: opacity 160ms ease;
    }
    .explore-modal-topnav button:hover,
    .explore-modal-topnav a:hover { opacity: 0.6; }

    .explore-modal-brand {
      position: absolute;
      top: 28px;
      left: clamp(24px, 4vw, 56px);
      font-size: 14px;
      color: #f4f4f4;
      font-weight: 500;
    }

    .explore-modal-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      cursor: pointer;
      color: #f4f4f4;
      font-size: 32px;
      width: 56px; height: 56px;
      display: grid;
      place-items: center;
      transition: opacity 160ms ease, transform 200ms ease;
      opacity: 0.6;
    }
    .explore-modal-arrow:hover { opacity: 1; }
    .explore-modal-arrow.prev { left: clamp(12px, 2vw, 32px); }
    .explore-modal-arrow.next { right: clamp(12px, 2vw, 32px); }
    .explore-modal-arrow.prev:hover { transform: translateY(-50%) translateX(-3px); }
    .explore-modal-arrow.next:hover { transform: translateY(-50%) translateX(3px); }

    .explore-modal-caption {
      position: absolute;
      left: clamp(24px, 4vw, 56px);
      bottom: clamp(24px, 4vh, 48px);
      font-size: 13px;
      line-height: 1.5;
      color: #f4f4f4;
      max-width: 360px;
    }
    .explore-modal-caption .t { font-style: italic; }
    .explore-modal-caption .meta {
      color: var(--explore-meta);
      margin-top: 2px;
    }

    .explore-modal-counter {
      position: absolute;
      right: clamp(24px, 4vw, 56px);
      bottom: clamp(24px, 4vh, 48px);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: #f4f4f4;
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .explore-modal-counter .label { color: var(--explore-meta); }
  </style>
</head>

  <script>
    // ─── Project catalog ──────────────────────────────────
    // Wired to real assets in /Explore. Subfolders = multi-image projects;
    // loose files = single-image projects. Each file used only once.
    // Only `w` is set per item — height comes from the image's natural ratio.
    const EX = "Explore/";

    const projects = [
      {
        name: "Acid League",
        items: [
          { src: EX + "Acid League/Acid League 1.mp4",        type: "video", w: 62 },
          { src: EX + "Acid League/Acid League 2.mp4",        type: "video", w: 55 },

          { src: EX + "Anzza/Anzza Brand Illustrations.png",   type: "image", w: 65 },
          { src: EX + "Anzza/Anzza Brand Illustrations-1.png", type: "image", w: 65 },
        ],
      },
      {
        name: "Mysun",
        items: [
          { src: EX + "Mysun/Mysun - marketing site.png", type: "image", w: 65 },
          { src: EX + "Mysun/MySun App.png",              type: "image", w: 70 },
          { src: EX + "Mysun/mySUN.png",                  type: "image", w: 55 },
          { src: EX + "Mysun/mySUN 2.png",                type: "image", w: 55 },

          { src: EX + "Mysun/mySUN 6.png",                type: "image", w: 55 },
          { src: EX + "Mysun/mySUN.mp4",                  type: "video", w: 62 },
        ],
      },
      {
        name: "Zari zar",
        items: [
          { src: EX + "Zari zar /Frame.png",            type: "image", w: 58 },
          { src: EX + "Zari zar /Frame-1.png",          type: "image", w: 55 },
          { src: EX + "Zari zar /Frame-2.png",          type: "image", w: 55 },
          { src: EX + "Zari zar /Frame-3.png",          type: "image", w: 52 },
          { src: EX + "Zari zar /Frame-4.png",          type: "image", w: 52 },
          { src: EX + "Zari zar /Frame-5.png",          type: "image", w: 52 },
          { src: EX + "Zari zar /Frame-6.png",          type: "image", w: 52 },
          { src: EX + "Zari zar /Frame-7.png",          type: "image", w: 52 },
          { src: EX + "Zari zar /Frame-8.png",          type: "image", w: 52 },
          { src: EX + "Zari zar /Frame 1430106214.png", type: "image", w: 62 },
        ],
      },
      { name: "Arc teryx",           items: [{ src: EX + "Arc teryx/Portfolio_16 .jpg",      type: "image", w: 65 }] },
      { name: "Bochi Lights",        items: [{ src: EX + "Bochi Lights.MP4",                 type: "video", w: 58 }] },
      { name: "Final Minor Figures", items: [{ src: EX + "Final Minor figures.mp4",          type: "video", w: 70 }] },
      { name: "Final Mockup",        items: [{ src: EX + "Final Mockup_.png",                type: "image", w: 62 }] },
      { name: "Hot Girl Pickles",    items: [{ src: EX + "Hot Girl Pickles - Progress.mp4",  type: "video", w: 55 }] },
      { name: "New York",            items: [{ src: EX + "New York.MP4",                     type: "video", w: 70 }] },
      { name: "Oli Olive Oil",       items: [{ src: EX + "Oli Olive Oil.MP4",                type: "video", w: 55 }] },
      { name: "Archi Final",         items: [{ src: EX + "Archi final .mp4",                 type: "video", w: 70 }] },
      { name: "Coolio",              items: [{ src: EX + "Coolio header.png",                type: "image", w: 70 }] },
      { name: "Fellowship",          items: [{ src: EX + "Fellowship.mp4",                   type: "video", w: 62 }] },
      { name: "Final Cellphone",     items: [{ src: EX + "final cellphone.mp4",              type: "video", w: 58 }] },
      { name: "Portfolio 1",         items: [{ src: EX + "Portfolio_1.mp4",                  type: "video", w: 65 }] },
      { name: "Portfolio 19",        items: [{ src: EX + "Portfolio_19.jpg",                 type: "image", w: 58 }] },
      { name: "Portfolio 20",        items: [{ src: EX + "Portfolio_20.jpg",                 type: "image", w: 58 }] },
      { name: "Frame 207",           items: [{ src: EX + "Frame 1430106207.png",             type: "image", w: 58 }] },
      { name: "Frame 208",           items: [{ src: EX + "Frame 1430106208.png",             type: "image", w: 58 }] },
      { name: "Frame 209",           items: [{ src: EX + "Frame 1430106209.png",             type: "image", w: 58 }] },
      { name: "Frame 210",           items: [{ src: EX + "Frame 1430106210.png",             type: "image", w: 58 }] },
      { name: "Frame 211",           items: [{ src: EX + "Frame 1430106211.png",             type: "image", w: 58 }] },
      { name: "Frame 212",           items: [{ src: EX + "Frame 1430106212.png",             type: "image", w: 58 }] },
    ];

    // ─── Build the canvas (scattered constellation) ────────
    const world = document.getElementById("exploreWorld");
    const stage = document.getElementById("exploreStage");

    // Seeded RNG so layout is stable between reloads
    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const rand = mulberry32(7);

    // Scatter region (world units). Sized to viewport so every item fits
    // on one screen — no panning required to see them all.
    const NAV_TOP   = 90;
    const CHROME_B  = 90;
    const SPREAD_X = Math.max(900, window.innerWidth  - 60);
    const SPREAD_Y = Math.max(500, window.innerHeight - NAV_TOP - CHROME_B);
    const PAD     = 10;
    const placed = []; // { x, y, w, h }

    function rectsOverlap(a, b, pad) {
      return !(a.x + a.w + pad <= b.x ||
               b.x + b.w + pad <= a.x ||
               a.y + a.h + pad <= b.y ||
               b.y + b.h + pad <= a.y);
    }

    function findSpot(w, h) {
      // Try multiple padding tiers from generous to zero. At pad=0 we still
      // refuse any actual intersection — never produce full overlap.
      for (const pad of [PAD, 6, 3, 1, 0]) {
        for (let i = 0; i < 250; i++) {
          const x = (rand() - 0.5) * SPREAD_X - w / 2;
          const y = (rand() - 0.5) * SPREAD_Y - h / 2;
          const cand = { x, y, w, h };
          let ok = true;
          for (const p of placed) {
            if (rectsOverlap(cand, p, pad)) { ok = false; break; }
          }
          if (ok) return { x, y };
        }
      }
      // Grid fallback — walk a fine grid and return the first non-overlapping cell.
      const stepX = Math.max(8, w / 4);
      const stepY = Math.max(8, h / 4);
      for (let y = -SPREAD_Y / 2; y <= SPREAD_Y / 2 - h; y += stepY) {
        for (let x = -SPREAD_X / 2; x <= SPREAD_X / 2 - w; x += stepX) {
          const cand = { x, y, w, h };
          let ok = true;
          for (const p of placed) {
            if (rectsOverlap(cand, p, 0)) { ok = false; break; }
          }
          if (ok) return { x, y };
        }
      }
      // Truly no room — push outside viewport rather than overlap visibly.
      return { x: SPREAD_X / 2 + 40, y: 0 };
    }

    projects.forEach((proj, pIdx) => {
      proj.items.forEach((it, iIdx) => {
        // Over-estimate height for collision detection (portrait media
        // can be ~1.5x its width) so thumbs don't pile on top of each other.
        const estH = Math.round(it.w * 1.4);
        const spot = findSpot(it.w, estH);
        placed.push({ x: spot.x, y: spot.y, w: it.w, h: estH });

        const zi  = Math.floor(rand() * 10); // 0–9 so title (z:5) is sandwiched
        const baseTransform = `translate(${spot.x}px, ${spot.y}px)`;

        const thumb = document.createElement("div");
        thumb.className = "explore-thumb";
        thumb.dataset.project = pIdx;
        thumb.dataset.image   = iIdx;
        thumb.style.zIndex = zi;
        thumb.style.setProperty("--base-transform", baseTransform);

        const media = it.type === "video"
          ? `<video autoplay muted loop playsinline preload="metadata"><source src="${it.src}" type="video/mp4"></video>`
          : `<img src="${it.src}" alt="${proj.name}" loading="lazy">`;

        thumb.innerHTML = `<div class="explore-thumb-media" style="width:${it.w}px;">${media}</div>`;

        thumb.addEventListener("click", () => {
          if (dragMoved) return;
          openModal(pIdx, iIdx);
        });
        thumb.addEventListener("mouseenter", () => showMeta(pIdx, iIdx));
        thumb.addEventListener("mouseleave", () => resetMeta());

        world.appendChild(thumb);
      });
    });

    // ─── Mouse-driven pan ──────────────────────────────────
    // Cursor position alone drives the camera: mouse at center → world
    // centered; mouse toward an edge → world pans the opposite way to
    // reveal what's on that side. No drag, no scroll — just move.
    let camX = 0, camY = 0;          // current (smoothed) camera position
    let targetX = 0, targetY = 0;    // target driven by mouse
    // dragMoved kept as a no-op for the existing click guard
    let dragMoved = false;

    // Everything already fits on one screen — pan is now a subtle
    // parallax "look-around" rather than a way to reveal content.
    const PAN_X = 50;
    const PAN_Y = 35;

    function applyTransform() {
      world.style.transform = `translate3d(${camX.toFixed(2)}px, ${camY.toFixed(2)}px, 0)`;
    }
    applyTransform();

    // Cursor pan disabled — canvas is static.

    // ─── Nav indicator (shared) ────────────────────────────
    function bindIndicator(container, indicatorSelector, itemSelector, activeSelector) {
      if (!container) return;
      const indicator = container.querySelector(indicatorSelector);
      const items = [...container.querySelectorAll(itemSelector)];
      if (!indicator || items.length === 0) return;
      let activeItem = activeSelector ? container.querySelector(activeSelector) : null;
      function placeIndicator(item, color) {
        if (!item) return;
        const cb = container.getBoundingClientRect();
        const ib = item.getBoundingClientRect();
        const x = ib.left - cb.left + 4;
        const y = ib.top - cb.top + ib.height / 2;
        indicator.style.transform = `translate(${x}px, ${y}px) translateY(-50%)`;
        if (color) indicator.style.backgroundColor = color;
      }
      if (activeItem) placeIndicator(activeItem);
      requestAnimationFrame(() => indicator.classList.add("is-ready"));
      items.forEach((item) => {
        item.addEventListener("mouseenter", () => placeIndicator(item, "#8a8a8a"));
        item.addEventListener("focus",      () => placeIndicator(item, "#8a8a8a"));
      });
      container.addEventListener("mouseleave", () => {
        if (activeItem) placeIndicator(activeItem); else indicator.style.opacity = "0";
      });
      container.addEventListener("mouseenter", () => indicator.style.opacity = "1");
    }
    bindIndicator(document.querySelector("nav"), ".nav-indicator", "a", "a.active");

    // ─── Meta block (swap content on thumb hover) ─────────────
    const metaTitle = document.getElementById("exploreMetaTitle");
    const metaDesc  = document.getElementById("exploreMetaDesc");
    const metaCta   = document.getElementById("exploreMetaCta");
    const DEFAULT_TITLE = metaTitle.textContent;
    const DEFAULT_DESC  = metaDesc.textContent;
    let metaCtaIdx = { p: 0, i: 0 };

    function showMeta(pIdx, iIdx) {
      const proj = projects[pIdx];
      const count = proj.items.length;
      const kind  = proj.items[iIdx].type === "video" ? "Video" : "Image";
      metaTitle.textContent = proj.name;
      metaDesc.textContent  = count > 1
        ? `${count} pieces — click any to view the project.`
        : `${kind} — click to open.`;
      metaCta.textContent = (count > 1 ? "View project" : "Open") + " →";
      metaCta.style.display = "inline-block";
      metaCtaIdx = { p: pIdx, i: iIdx };
    }
    function resetMeta() {
      metaTitle.textContent = DEFAULT_TITLE;
      metaDesc.textContent  = DEFAULT_DESC;
      metaCta.style.display = "none";
    }
    metaCta.addEventListener("click", () => openModal(metaCtaIdx.p, metaCtaIdx.i));

    // ─── Slide-down exit on internal navigation ──────────────
    document.querySelectorAll("a[href]").forEach((link) => {
      const href = link.getAttribute("href");
      if (!href || href.startsWith("http") || href.startsWith("mailto") || href.startsWith("#")) return;
      if (link.getAttribute("target") === "_blank") return;
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const dest = link.href;
        // mirror about.html signaling so /#work opens the Work panel
        if (link.getAttribute("data-nav") === "work") {
          window.localStorage.setItem("portfolio-active-panel", "work");
        } else if (link.getAttribute("data-nav") === "home") {
          window.localStorage.setItem("portfolio-active-panel", "home");
        }
        document.body.classList.add("is-exiting");
        setTimeout(() => { window.location.href = dest; }, 1280);
      });
    });

    // ─── Modal: scoped to a single project's images ────────
    const modal        = document.getElementById("exploreModal");
    const modalMedia   = document.getElementById("exploreModalMedia");
    const modalTitle   = document.getElementById("exploreModalTitle");
    const modalDesc    = document.getElementById("exploreModalDesc");
    const modalCta     = document.getElementById("exploreModalCta");
    const modalClose   = document.getElementById("exploreModalClose");
    const modalPrev    = document.getElementById("exploreModalPrev");
    const modalNext    = document.getElementById("exploreModalNext");
    const modalCounter = document.getElementById("exploreModalCounter");

    let curProj = 0;
    let curImg  = 0;

    function renderModal(pIdx, iIdx) {
      const proj = projects[pIdx];
      const item = proj.items[iIdx];
      curProj = pIdx; curImg = iIdx;
      const media = item.type === "video"
        ? `<video autoplay muted loop playsinline controls><source src="${item.src}" type="video/mp4"></video>`
        : `<img src="${item.src}" alt="${proj.name}">`;
      modalMedia.innerHTML = media;
      modalTitle.textContent = proj.name;
      modalDesc.textContent  = item.label || "Melody Ekbatani";
      if (proj.href) {
        modalCta.href = proj.href;
        modalCta.style.display = "inline";
      } else {
        modalCta.style.display = "none";
      }
      modalCounter.textContent = `${iIdx + 1} of ${proj.items.length}`;
    }

    function openModal(pIdx, iIdx) {
      renderModal(pIdx, iIdx);
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }
    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      // Stop any playing video before tearing it down
      const v = modalMedia.querySelector("video");
      if (v) { try { v.pause(); } catch (e) {} }
      // Clear after the fade-out so we don't see a blank flash mid-transition
      setTimeout(() => { modalMedia.innerHTML = ""; }, 240);
      document.body.style.overflow = "";
    }
    function nextItem() {
      const n = projects[curProj].items.length;
      renderModal(curProj, (curImg + 1) % n);
    }
    function prevItem() {
      const n = projects[curProj].items.length;
      renderModal(curProj, (curImg - 1 + n) % n);
    }

    modalClose.addEventListener("click", closeModal);
    modalNext.addEventListener("click", nextItem);
    modalPrev.addEventListener("click", prevItem);
    document.addEventListener("keydown", (e) => {
      if (!modal.classList.contains("is-open")) return;
      if (e.key === "Escape")     closeModal();
      if (e.key === "ArrowRight") nextItem();
      if (e.key === "ArrowLeft")  prevItem();
    });
  </script>

  <script src="nav.js" defer></script>
</body>
</html>
