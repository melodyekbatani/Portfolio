  <style>
    /* ─── Explore: scattered constellation canvas ────────── */
    :root {
      --explore-meta: #9a9a9a;
    }

    body.explore-page {
      overflow: hidden;
      height: 100vh;
      background-color: var(--bg, #ffffff);
      color: #1a232c;
    }

    body.explore-page nav {
      background-color: #ffffff;
      box-shadow: 0 8px 0 0 #ffffff;
    }

    /* Mobile burger lives outside <nav>, so the blend-mode doesn't reach
       it. Paint its lines white on the black explore bg. */
    body.explore-page .nav-burger span { background: #1a232c; }

    /* Full-viewport black surface that slides with the content — body bg
       stays neutral, so the slide-down actually reveals the underlying
       page color instead of snapping at navigation time. */
    .explore-bg {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 0;            /* sits above body bg, below content */
      will-change: transform;
    }

    /* Slide-up entrance — black panel + canvas + chrome rise from below.
       End/start at 110% (not 100%) so sub-pixel rounding can't leave a
       1px sliver at the viewport edge during transition. */
    @keyframes exploreSlideUp {
      from { transform: translate3d(0, 110%, 0); }
      to   { transform: translate3d(0, 0, 0); }
    }
    @keyframes exploreSlideDown {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(0, 110%, 0); }
    }
    .explore-bg,
    .explore-stage,
    .explore-meta,
    .explore-hint {
      animation: exploreSlideUp 1500ms cubic-bezier(0.22, 1, 0.36, 1) both;
      will-change: transform;
      backface-visibility: hidden;
      transform: translateZ(0);
    }
    body.is-exiting .explore-bg,
    body.is-exiting .explore-stage,
    body.is-exiting .explore-meta,
    body.is-exiting .explore-hint {
      animation: exploreSlideDown 1300ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    body.explore-page nav a { color: #1a232c; }
    body.explore-page nav .nav-indicator { background: #1a232c; }

    .explore-stage {
      position: fixed;
      inset: 0;
      cursor: default;
      user-select: none;
      z-index: 0;
      overflow: hidden;
    }

    .explore-world {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      will-change: transform;
    }

    /* Big faded title at the center of the canvas — pans with the world */
    .explore-title {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.0;
      color: #1a232c;
      pointer-events: none;
      white-space: nowrap;
      z-index: 5; /* mid-stack — some thumbs go above, some below */
    }
    .explore-title .line-1 {
      display: block;
      font-size: clamp(36px, 5vw, 56px);
    }
    .explore-title .line-2 {
      display: block;
      font-size: clamp(28px, 4vw, 44px);
      opacity: 0.85;
      margin-top: 4px;
    }

    /* Individual scattered thumbnails */
    .explore-thumb {
      position: absolute;
      cursor: pointer;
      transform: var(--base-transform);
      transition: filter 320ms ease;
      will-change: transform;
    }
    .explore-thumb:hover {
      z-index: 1000 !important;     /* always on top of siblings */
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.14));
    }

    .explore-thumb-media {
      display: block;
      overflow: hidden;
      transform-origin: center;
      transition: transform 620ms cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform;
    }
    .explore-thumb:hover .explore-thumb-media {
      transform: scale(3.2);
    }

    /* Meta block content swaps smoothly on hover */
    .explore-meta h1,
    .explore-meta p,
    .explore-meta .cta {
      transition: opacity 220ms ease;
    }
    .explore-meta .cta {
      flex: 0 0 auto;
      margin-left: auto;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a232c;
      border-bottom: 1px solid #1a232c;
      padding-bottom: 1px;
      cursor: pointer;
      pointer-events: auto;
    }
    .explore-meta .cta:hover { opacity: 0.7; }
    .explore-thumb-media img,
    .explore-thumb-media video {
      display: block;
      width: 100%;
      height: auto;        /* keep natural aspect, no crop */
      object-fit: contain;
    }

    /* Bottom bar — full viewport width, white, padding matches the top
       nav so the page reads as nav + canvas + bar. Hover text replaces
       the default copy in the same slot, so layout doesn't shift. */
    .explore-meta {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      box-sizing: border-box;
      min-height: 56px;          /* same height in hover + rest states */
      padding: 12px var(--pad-page);
      background: #ffffff;
      /* Single-row grid: title | desc | kind | counter */
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 20px;
      font-size: 13px;
      line-height: 1.4;
      color: #1a232c;
      z-index: 3;
      pointer-events: auto;
    }
    .explore-meta .t {
      font-weight: 700;
      font-size: 14px;
      color: #1a232c;
    }
    .explore-meta .meta {
      color: var(--explore-meta);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .explore-meta .kind    { color: var(--explore-meta); }
    .explore-meta .counter { color: #1a232c; letter-spacing: 0.02em; }

    .explore-hint {
      position: fixed;
      right: clamp(24px, 4vw, 56px);
      bottom: clamp(28px, 5vh, 56px);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--explore-meta);
      z-index: 3;
      pointer-events: none;
      display: flex; align-items: center; gap: 10px;
      opacity: 0.8;
    }
    .explore-hint .dot {
      width: 5px; height: 5px; border-radius: 50%; background: #1a232c;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.25; transform: scale(1); }
      50%     { opacity: 0.9; transform: scale(1.6); }
    }

    /* nav above canvas */
    nav { z-index: 4; }

    /* ─── Modal: shows a full project's images at large size ─── */
    .explore-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;          /* above nav + everything else */
      background: #ffffff;
      color: #1a232c;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms ease, visibility 0s linear 220ms;
    }
    .explore-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 220ms ease, visibility 0s linear 0s;
    }

    .explore-modal-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(40px, 6vh, 80px) clamp(80px, 10vw, 160px);
    }

    .explore-modal-media {
      max-width: 100%;
      max-height: 100%;
      display: grid;
      place-items: center;
      transform: translateY(8px);
      transition: transform 280ms cubic-bezier(.2,.7,.2,1);
    }
    .explore-modal.is-open .explore-modal-media { transform: translateY(0); }

    .explore-modal-media img,
    .explore-modal-media video {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 200px);
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .explore-modal-topnav {
      position: absolute;
      top: 28px;
      right: clamp(24px, 4vw, 56px);
      display: flex;
      gap: 28px;
      align-items: center;
      font-size: 14px;
      color: #1a232c;
      z-index: 5;          /* above the media stage inside the modal */
    }
    .explore-modal-topnav button,
    .explore-modal-topnav a {
      background: transparent;
      border: 0;
      padding: 8px 4px;     /* larger hit target */
      margin: 0;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      color: #1a232c;
      transition: opacity 160ms ease;
    }
    .explore-modal-topnav button:hover,
    .explore-modal-topnav a:hover { opacity: 0.6; }

    .explore-modal-brand {
      position: absolute;
      top: 28px;
      left: clamp(24px, 4vw, 56px);
      font-size: 14px;
      color: #1a232c;
      font-weight: 500;
    }

    .explore-modal-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      cursor: pointer;
      color: #1a232c;
      font-size: 32px;
      width: 56px; height: 56px;
      z-index: 6;       /* above the modal stage so clicks reach it */
      display: grid;
      place-items: center;
      transition: opacity 160ms ease, transform 200ms ease;
      opacity: 0.6;
    }
    .explore-modal-arrow:hover { opacity: 1; }
    .explore-modal-arrow.prev { left: clamp(12px, 2vw, 32px); }
    .explore-modal-arrow.next { right: clamp(12px, 2vw, 32px); }
    .explore-modal-arrow.prev:hover { transform: translateY(-50%) translateX(-3px); }
    .explore-modal-arrow.next:hover { transform: translateY(-50%) translateX(3px); }

    .explore-modal-caption {
      position: absolute;
      left: clamp(24px, 4vw, 56px);
      right: clamp(24px, 4vw, 56px);
      bottom: clamp(24px, 4vh, 48px);
      font-size: 13px;
      line-height: 1.5;
      color: #1a232c;
      max-width: 720px;
    }
    .explore-modal-caption .t { font-weight: 700; }
    .explore-modal-caption .meta {
      color: var(--explore-meta);
      margin-top: 2px;
    }
  </style>
</head>

    // ─── Build the canvas (scattered constellation) ────────
    const world = document.getElementById("exploreWorld");
    const stage = document.getElementById("exploreStage");

    // Seeded RNG so layout is stable between reloads
    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const rand = mulberry32(7);

    // Scatter region (world units). Sized to viewport so every item fits
    // on one screen — no panning required to see them all.
    const NAV_TOP   = 120;     /* generous nav clearance */
    const CHROME_B  = 80;
    /* Spread fits inside the viewport (minus nav top + bottom bar) so
       nothing gets cut off; PAD keeps items visually separated. */
    const SPREAD_X = Math.max(900, window.innerWidth  - 120);
    const SPREAD_Y = Math.max(500, window.innerHeight - NAV_TOP - CHROME_B);
    /* Offset the scatter vertically so the y-range clears the fixed nav at
       top and bottom bar — world origin is centered, but items are biased
       down by (CHROME_B - NAV_TOP) / 2. */
    const Y_OFFSET = (NAV_TOP - CHROME_B) / 2;
    const PAD     = 20;
    const placed = []; // { x, y, w, h }

    function rectsOverlap(a, b, pad) {
      return !(a.x + a.w + pad <= b.x ||
               b.x + b.w + pad <= a.x ||
               a.y + a.h + pad <= b.y ||
               b.y + b.h + pad <= a.y);
    }

    /* Collision-checked placement. We try many random candidates per item,
       reject anything that overlaps already-placed rects (with PAD), and
       keep the best (most empty-feeling) spot. Items are sorted
       largest-first so big rects don't get squeezed into leftover gaps. */
    const TOTAL_ITEMS = projects.reduce((n, p) => n + p.items.length, 0);
    const SIZE_SCALE = 0.58;
    const GAP = 28; // min visual gap between any two items

    // Build a flat list of all items with stable identity, then sort by size.
    // Height estimate is over-generous (1.75x w) because portrait media
    // (phone mockups, pineapples, posters) routinely exceed 1.5x.
    const flatItems = [];
    projects.forEach((proj, pIdx) => {
      proj.items.forEach((it, iIdx) => {
        const w = Math.round(it.w * SIZE_SCALE);
        const h = Math.round(w * 1.75);
        flatItems.push({ pIdx, iIdx, it, w, h });
      });
    });
    flatItems.sort((a, b) => (b.w * b.h) - (a.w * a.h));

    function findSpot(w, h) {
      const halfX = SPREAD_X / 2;
      const halfY = SPREAD_Y / 2;
      const minX = -halfX;
      const maxX =  halfX - w;
      const minY = -halfY + Y_OFFSET;
      const maxY =  halfY + Y_OFFSET - h;
      let best = null;
      let bestScore = -Infinity;
      // Try a generous number of random candidates; score by distance to
      // nearest neighbor so we naturally spread across empty regions.
      for (let i = 0; i < 220; i++) {
        const x = minX + rand() * (maxX - minX);
        const y = minY + rand() * (maxY - minY);
        const cand = { x, y, w, h };
        let ok = true;
        let nearest = Infinity;
        for (let j = 0; j < placed.length; j++) {
          const p = placed[j];
          if (rectsOverlap(cand, p, GAP)) { ok = false; break; }
          const dx = (x + w/2) - (p.x + p.w/2);
          const dy = (y + h/2) - (p.y + p.h/2);
          const d = dx*dx + dy*dy;
          if (d < nearest) nearest = d;
        }
        if (!ok) continue;
        if (nearest > bestScore) { bestScore = nearest; best = cand; }
      }
      // Progressive fallback: relax the gap until we find a spot. Final
       // resort is a random position (overlap allowed) so items always
       // appear on the canvas instead of stacking in a corner.
      if (!best) {
        for (const relaxGap of [12, 4, 0]) {
          for (let i = 0; i < 200; i++) {
            const x = minX + rand() * (maxX - minX);
            const y = minY + rand() * (maxY - minY);
            const cand = { x, y, w, h };
            let ok = true;
            for (let j = 0; j < placed.length; j++) {
              if (rectsOverlap(cand, placed[j], relaxGap)) { ok = false; break; }
            }
            if (ok) { best = cand; break; }
          }
          if (best) break;
        }
      }
      if (!best) {
        best = {
          x: minX + rand() * (maxX - minX),
          y: minY + rand() * (maxY - minY),
          w, h
        };
      }
      return best;
    }

    flatItems.forEach(({ pIdx, iIdx, it, w, h }) => {
      const spot = findSpot(w, h);
      placed.push({ x: spot.x, y: spot.y, w, h });

      const proj = projects[pIdx];

        const zi  = Math.floor(rand() * 10); // 0–9 so title (z:5) is sandwiched
        const baseTransform = `translate(${spot.x}px, ${spot.y}px)`;

        const thumb = document.createElement("div");
        thumb.className = "explore-thumb";
        thumb.dataset.project = pIdx;
        thumb.dataset.image   = iIdx;
        thumb.style.zIndex = zi;
        thumb.style.setProperty("--base-transform", baseTransform);

        // Canvas uses tiny webp thumbnails for speed; modal swaps in originals.
        const thumbSrc = it.type === "video"
          ? it.src
          : it.src.replace(/^Explore\//, "Explore/thumbs/").replace(/\.[^.]+$/, ".webp");
        const media = it.type === "video"
          ? `<video muted loop playsinline preload="none" data-lazy-video><source src="${it.src}" type="video/mp4"></video>`
          : `<img src="${thumbSrc}" alt="${proj.name}" loading="lazy" decoding="async">`;

        thumb.innerHTML = `<div class="explore-thumb-media" style="width:${w}px;">${media}</div>`;

        thumb.addEventListener("click", () => {
          if (dragMoved) return;
          openModal(pIdx, iIdx);
        });
        thumb.addEventListener("mouseenter", () => {
          showMeta(pIdx, iIdx);
          // Lazy: only start loading + playing the video when the user
          // hovers it. Keeps initial page load fast (no upfront fetches).
          const v = thumb.querySelector("video[data-lazy-video]");
          if (v) {
            if (v.preload === "none") v.preload = "metadata";
            v.play().catch(() => {});
          }
        });
        thumb.addEventListener("mouseleave", () => {
          resetMeta();
          const v = thumb.querySelector("video[data-lazy-video]");
          if (v) { try { v.pause(); } catch (e) {} }
        });

        world.appendChild(thumb);
    });

    // ─── Mouse-driven pan ──────────────────────────────────
    // Cursor position alone drives the camera: mouse at center → world
    // centered; mouse toward an edge → world pans the opposite way to
    // reveal what's on that side. No drag, no scroll — just move.
    let camX = 0, camY = 0;          // current (smoothed) camera position
    let targetX = 0, targetY = 0;    // target driven by mouse
    // dragMoved kept as a no-op for the existing click guard
    let dragMoved = false;

    // Everything already fits on one screen — pan is now a subtle
    // parallax "look-around" rather than a way to reveal content.
    const PAN_X = 50;
    const PAN_Y = 35;

    function applyTransform() {
      world.style.transform = `translate3d(${camX.toFixed(2)}px, ${camY.toFixed(2)}px, 0)`;
    }
    applyTransform();

    // Cursor pan disabled — canvas is static.

    // ─── Nav indicator (shared) ────────────────────────────
    function bindIndicator(container, indicatorSelector, itemSelector, activeSelector) {
      if (!container) return;
      const indicator = container.querySelector(indicatorSelector);
      const items = [...container.querySelectorAll(itemSelector)];
      if (!indicator || items.length === 0) return;
      let activeItem = activeSelector ? container.querySelector(activeSelector) : null;
      function placeIndicator(item, color) {
        if (!item) return;
        const cb = container.getBoundingClientRect();
        const ib = item.getBoundingClientRect();
        const x = ib.left - cb.left + 4;
        const y = ib.top - cb.top + ib.height / 2;
        indicator.style.transform = `translate(${x}px, ${y}px) translateY(-50%)`;
        if (color) indicator.style.backgroundColor = color;
      }
      if (activeItem) placeIndicator(activeItem);
      requestAnimationFrame(() => indicator.classList.add("is-ready"));
      items.forEach((item) => {
        item.addEventListener("mouseenter", () => placeIndicator(item, "#8a8a8a"));
        item.addEventListener("focus",      () => placeIndicator(item, "#8a8a8a"));
      });
      container.addEventListener("mouseleave", () => {
        if (activeItem) placeIndicator(activeItem); else indicator.style.opacity = "0";
      });
      container.addEventListener("mouseenter", () => indicator.style.opacity = "1");
    }
    bindIndicator(document.querySelector("nav"), ".nav-indicator", "a", "a.active");

    // ─── Meta block (swap content on thumb hover) ─────────────
    const metaTitle   = document.getElementById("exploreMetaTitle");
    const metaDesc    = document.getElementById("exploreMetaDesc");
    const metaKind    = document.getElementById("exploreMetaKind");
    const metaCounter = document.getElementById("exploreMetaCounter");
    const DEFAULT_TITLE = metaTitle.textContent;
    const DEFAULT_DESC  = metaDesc.textContent;

    function showMeta(pIdx, iIdx) {
      const proj = projects[pIdx];
      const item = proj.items[iIdx];
      // Bar shows the PROJECT description; per-image labels live in the modal.
      metaTitle.textContent   = proj.name;
      metaDesc.textContent    = proj.desc || "";
      metaKind.textContent    = item.type === "video" ? "Video" : "Image";
      metaCounter.textContent = `${iIdx + 1} of ${proj.items.length}`;
    }
    function resetMeta() {
      metaTitle.textContent   = DEFAULT_TITLE;
      metaDesc.textContent    = DEFAULT_DESC;
      metaKind.textContent    = "";
      metaCounter.textContent = "";
    }

    // ─── Slide-down exit on internal navigation ──────────────
    document.querySelectorAll("a[href]").forEach((link) => {
      const href = link.getAttribute("href");
      if (!href || href.startsWith("http") || href.startsWith("mailto") || href.startsWith("#")) return;
      if (link.getAttribute("target") === "_blank") return;
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const dest = link.href;
        // mirror about.html signaling so /#work opens the Work panel
        if (link.getAttribute("data-nav") === "work") {
          window.localStorage.setItem("portfolio-active-panel", "work");
        } else if (link.getAttribute("data-nav") === "home") {
          window.localStorage.setItem("portfolio-active-panel", "home");
        }
        document.body.classList.add("is-exiting");
        setTimeout(() => { window.location.href = dest; }, 1280);
      });
    });

    // ─── Modal: scoped to a single project's images ────────
    const modal        = document.getElementById("exploreModal");
    const modalMedia   = document.getElementById("exploreModalMedia");
    const modalTitle   = document.getElementById("exploreModalTitle");
    const modalDesc    = document.getElementById("exploreModalDesc");
    const modalCta     = document.getElementById("exploreModalCta");
    const modalClose   = document.getElementById("exploreModalClose");
    const modalPrev    = document.getElementById("exploreModalPrev");
    const modalNext    = document.getElementById("exploreModalNext");

    let curProj = 0;
    let curImg  = 0;

    function renderModal(pIdx, iIdx) {
      const proj = projects[pIdx];
      const item = proj.items[iIdx];
      curProj = pIdx; curImg = iIdx;
      const media = item.type === "video"
        ? `<video autoplay muted loop playsinline controls><source src="${item.src}" type="video/mp4"></video>`
        : `<img src="${item.src}" alt="${proj.name}">`;
      modalMedia.innerHTML = media;
      modalTitle.textContent = proj.name;
      modalDesc.textContent  = item.label || proj.desc || "";
      if (proj.href) {
        modalCta.href = proj.href;
        modalCta.style.display = "inline";
      } else {
        modalCta.style.display = "none";
      }
    }

    function openModal(pIdx, iIdx) {
      renderModal(pIdx, iIdx);
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }
    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      // Stop any playing video before tearing it down
      const v = modalMedia.querySelector("video");
      if (v) { try { v.pause(); } catch (e) {} }
      // Clear after the fade-out so we don't see a blank flash mid-transition
      setTimeout(() => { modalMedia.innerHTML = ""; }, 240);
      document.body.style.overflow = "";
    }
    function nextItem() {
      const n = projects[curProj].items.length;
      renderModal(curProj, (curImg + 1) % n);
    }
    function prevItem() {
      const n = projects[curProj].items.length;
      renderModal(curProj, (curImg - 1 + n) % n);
    }

    modalClose.addEventListener("click", closeModal);
    modalNext.addEventListener("click", nextItem);
    modalPrev.addEventListener("click", prevItem);
    document.addEventListener("keydown", (e) => {
      if (!modal.classList.contains("is-open")) return;
      if (e.key === "Escape")     closeModal();
      if (e.key === "ArrowRight") nextItem();
      if (e.key === "ArrowLeft")  prevItem();
    });
  </script>

  <script src="nav.js" defer></script>
</body>
</html>
