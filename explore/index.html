  <style>
    /* ─── Explore: scattered constellation canvas ────────── */
    :root {
      --explore-meta: #9a9a9a;
    }

    body.explore-page {
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 100vh;
      background-color: var(--bg, #ffffff);
      color: #1a232c;
    }

    body.explore-page nav {
      background-color: #ffffff;
      box-shadow: 0 8px 0 0 #ffffff;
    }

    /* Mobile burger lives outside <nav>, so the blend-mode doesn't reach
       it. Paint its lines white on the black explore bg. */
    body.explore-page .nav-burger span { background: #1a232c; }

    /* Full-viewport black surface that slides with the content — body bg
       stays neutral, so the slide-down actually reveals the underlying
       page color instead of snapping at navigation time. */
    .explore-bg {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 0;            /* sits above body bg, below content */
      will-change: transform;
    }

    /* Page-load + page-exit transitions are owned by the cross-document
       View Transitions API in style.css. */
    body.explore-page nav a { color: #1a232c; }
    body.explore-page nav .nav-indicator { background: #1a232c; }

    .explore-stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      cursor: default;
    }

    /* Responsive masonry: equal-width columns, organic varied heights.
       No max-width — the canvas extends edge-to-edge on wide displays.
       Column count steps up on big screens so tiles don't get oversized. */
    .explore-world {
      column-count: 5;
      column-gap: 22px;
      margin: 0;
      padding: 132px 40px 140px;
    }
    @media (min-width: 1920px) { .explore-world { column-count: 7; } }
    @media (min-width: 1600px) and (max-width: 1919px) { .explore-world { column-count: 6; } }
    @media (max-width: 1280px) { .explore-world { column-count: 4; } }
    @media (max-width: 960px)  { .explore-world { column-count: 3; } }
    @media (max-width: 640px)  { .explore-world { column-count: 3; column-gap: 8px; padding: 108px 20px 132px; } }

    /* Big faded title at the center of the canvas — pans with the world */
    .explore-title {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.0;
      color: #1a232c;
      pointer-events: none;
      white-space: nowrap;
      z-index: 5; /* mid-stack — some thumbs go above, some below */
    }
    .explore-title .line-1 {
      display: block;
      font-size: clamp(36px, 5vw, 56px);
    }
    .explore-title .line-2 {
      display: block;
      font-size: clamp(28px, 4vw, 44px);
      opacity: 0.85;
      margin-top: 4px;
    }

    /* Masonry tiles — seeded per-item rotation/gap/inset keep the random vibe */
    .explore-thumb {
      break-inside: avoid;
      width: 100%;
      margin: 0 0 var(--gap, 44px);
      cursor: pointer;
      position: relative;
      transition: transform 360ms cubic-bezier(0.16, 1, 0.3, 1), filter 320ms ease;
    }
    .explore-thumb:hover {
      transform: scale(1.35);
      z-index: 5;
      filter: drop-shadow(0 18px 44px rgba(0,0,0,0.2));
    }

    /* Smaller media centered in the cell, with whitespace around it */
    .explore-thumb-media {
      display: block;
      overflow: hidden;
      border-radius: var(--radius, 4px);
      width: var(--media-w, 68%);
      margin: 0 auto;
    }

    /* Meta block content swaps smoothly on hover */
    .explore-meta h1,
    .explore-meta p,
    .explore-meta .cta {
      transition: opacity 220ms ease;
    }
    .explore-meta .cta {
      flex: 0 0 auto;
      margin-left: auto;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a232c;
      border-bottom: 1px solid #1a232c;
      padding-bottom: 1px;
      cursor: pointer;
      pointer-events: auto;
    }
    .explore-meta .cta:hover { opacity: 0.7; }
    .explore-thumb-media img,
    .explore-thumb-media video {
      display: block;
      width: 100%;
      height: auto;        /* keep natural aspect, no crop */
      object-fit: contain;
    }
    /* Per-item nudge to hide thin edge/letterbox seams on specific videos */
    .explore-thumb-media video.scaled { transform: scale(1.02); }

    /* Bottom bar — full viewport width, white, padding matches the top
       nav so the page reads as nav + canvas + bar. Hover text replaces
       the default copy in the same slot, so layout doesn't shift. */
    .explore-meta {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      box-sizing: border-box;
      min-height: 56px;          /* same height in hover + rest states */
      padding: 12px var(--pad-page);
      background: #ffffff;
      /* Single-row grid: title | desc | kind | counter */
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 20px;
      font-size: 13px;
      line-height: 1.4;
      color: #1a232c;
      z-index: 3;
      pointer-events: auto;
    }
    .explore-meta .t {
      font-weight: 700;
      font-size: 14px;
      color: #1a232c;
    }
    .explore-meta .meta {
      color: var(--explore-meta);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .explore-meta .kind    { color: var(--explore-meta); }
    .explore-meta .counter { color: #1a232c; letter-spacing: 0.02em; }

    .explore-hint {
      position: fixed;
      right: clamp(24px, 4vw, 56px);
      bottom: clamp(28px, 5vh, 56px);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--explore-meta);
      z-index: 3;
      pointer-events: none;
      display: flex; align-items: center; gap: 10px;
      opacity: 0.8;
    }
    .explore-hint .dot {
      width: 5px; height: 5px; border-radius: 50%; background: #1a232c;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.25; transform: scale(1); }
      50%     { opacity: 0.9; transform: scale(1.6); }
    }

    /* nav above canvas */
    nav { z-index: 4; }

    /* ─── Modal: shows a full project's images at large size ─── */
    .explore-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;          /* above nav + everything else */
      background: #ffffff;
      color: #1a232c;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms ease, visibility 0s linear 220ms;
    }
    .explore-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 220ms ease, visibility 0s linear 0s;
    }

    .explore-modal-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(40px, 6vh, 80px) clamp(80px, 10vw, 160px);
    }

    .explore-modal-media {
      max-width: 100%;
      max-height: 100%;
      display: grid;
      place-items: center;
      transform: translateY(8px);
      transition: transform 280ms cubic-bezier(.2,.7,.2,1);
    }
    .explore-modal.is-open .explore-modal-media { transform: translateY(0); }

    .explore-modal-media img,
    .explore-modal-media video {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 200px);
      width: auto;
      height: auto;
      object-fit: contain;
    }
    .explore-modal-media video.scaled { transform: scale(1.02); }

    .explore-modal-topnav {
      position: absolute;
      top: 28px;
      right: clamp(24px, 4vw, 56px);
      display: flex;
      gap: 28px;
      align-items: center;
      font-size: 14px;
      color: #1a232c;
      z-index: 5;          /* above the media stage inside the modal */
    }
    .explore-modal-topnav button,
    .explore-modal-topnav a {
      background: transparent;
      border: 0;
      padding: 8px 4px;     /* larger hit target */
      margin: 0;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      color: #1a232c;
      transition: opacity 160ms ease;
    }
    .explore-modal-topnav button:hover,
    .explore-modal-topnav a:hover { opacity: 0.6; }

    .explore-modal-brand {
      position: absolute;
      top: 28px;
      left: clamp(24px, 4vw, 56px);
      font-size: 14px;
      color: #1a232c;
      font-weight: 500;
    }

    .explore-modal-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      cursor: pointer;
      color: #1a232c;
      font-size: 32px;
      width: 56px; height: 56px;
      z-index: 6;       /* above the modal stage so clicks reach it */
      display: grid;
      place-items: center;
      transition: opacity 160ms ease, transform 200ms ease;
      opacity: 0.6;
    }
    .explore-modal-arrow:hover { opacity: 1; }
    .explore-modal-arrow.prev { left: clamp(12px, 2vw, 32px); }
    .explore-modal-arrow.next { right: clamp(12px, 2vw, 32px); }
    .explore-modal-arrow.prev:hover { transform: translateY(-50%) translateX(-3px); }
    .explore-modal-arrow.next:hover { transform: translateY(-50%) translateX(3px); }

    .explore-modal-caption {
      position: absolute;
      left: clamp(24px, 4vw, 56px);
      right: clamp(24px, 4vw, 56px);
      bottom: clamp(24px, 4vh, 48px);
      font-size: 13px;
      line-height: 1.5;
      color: #1a232c;
      max-width: 720px;
    }
    .explore-modal-caption .t { font-weight: 700; }
    .explore-modal-caption .meta {
      color: var(--explore-meta);
      margin-top: 2px;
    }
  </style>
</head>

    // ─── Build the canvas (scattered constellation) ────────
    const world = document.getElementById("exploreWorld");
    const stage = document.getElementById("exploreStage");

    // Seeded RNG so layout is stable between reloads
    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const rand = mulberry32(7);

    // Flatten every item, then shuffle with the seeded RNG so the order
    // feels random but stays stable across reloads.
    const flatItems = [];
    projects.forEach((proj, pIdx) => {
      proj.items.forEach((it, iIdx) => {
        flatItems.push({ pIdx, iIdx, it });
      });
    });
    for (let i = flatItems.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [flatItems[i], flatItems[j]] = [flatItems[j], flatItems[i]];
    }

    // Spread items so no two consecutive ones share a project — this keeps
    // same-project tiles from sitting directly beside/above/below each other
    // in the column masonry. Greedy: always take from the project with the
    // most remaining items that isn't the one we just placed.
    (function spreadByProject() {
      const buckets = new Map();
      for (const it of flatItems) {
        if (!buckets.has(it.pIdx)) buckets.set(it.pIdx, []);
        buckets.get(it.pIdx).push(it);
      }
      const result = [];
      let lastP = -1;
      while (result.length < flatItems.length) {
        let bestP = -1, bestN = -1;
        for (const [p, arr] of buckets) {
          if (arr.length === 0 || p === lastP) continue;
          if (arr.length > bestN) { bestN = arr.length; bestP = p; }
        }
        if (bestP === -1) { // only the last project's items remain
          for (const [p, arr] of buckets) { if (arr.length) { bestP = p; break; } }
        }
        result.push(buckets.get(bestP).pop());
        lastP = bestP;
      }
      flatItems.length = 0;
      Array.prototype.push.apply(flatItems, result);
    })();

    // Reorder for the masonry: positive `featured: N` items go to the top
    // (ascending), items on a project flagged `deprioritize: true` or with
    // `featured < 0` go to the bottom (ascending = -1 above -2). Everything
    // else keeps its shuffled order in the middle.
    (function reorderFeatured() {
      const top = [], mid = [], bottom = [];
      for (const x of flatItems) {
        const proj = projects[x.pIdx];
        const f = x.it.featured;
        if (proj.deprioritize || (typeof f === "number" && f < 0)) bottom.push(x);
        else if (typeof f === "number" && f > 0) top.push(x);
        else mid.push(x);
      }
      top.sort((a, b) => a.it.featured - b.it.featured);
      bottom.sort((a, b) => {
        const af = typeof a.it.featured === "number" ? a.it.featured : 0;
        const bf = typeof b.it.featured === "number" ? b.it.featured : 0;
        return bf - af; // -1 before -2
      });
      flatItems.length = 0;
      Array.prototype.push.apply(flatItems, top.concat(mid, bottom));
    })();

    // dragMoved kept as a no-op for the existing click guard
    let dragMoved = false;

    // On mobile we render video items as static jpg posters in the masonry
    // (modal still plays the real video). Killing video decode on mobile is
    // the single biggest perf win on the constellation page.
    const isMobileVid = window.matchMedia("(max-width: 768px)").matches;
    const videoIO = ("IntersectionObserver" in window)
      ? new IntersectionObserver((entries) => {
          for (const e of entries) {
            const v = e.target;
            if (e.isIntersecting) {
              if (v.dataset.poster && !v.getAttribute("poster")) {
                v.setAttribute("poster", v.dataset.poster);
              }
              if (v.preload !== "auto") v.preload = "auto";
              v.play().catch(() => {});
            } else {
              try { v.pause(); } catch (err) {}
            }
          }
        }, { rootMargin: isMobileVid ? "150px 0px" : "300px 0px" })
      : null;

    // Render the masonry in batches: the first batch paints immediately
    // (so the page entrance feels instant), the rest schedule on idle.
    function buildTile(pIdx, iIdx, it, tileIdx) {
      const proj = projects[pIdx];

      // Seeded per-tile variation keeps the random vibe: smaller media at
      // varied sizes, with varied whitespace around each tile.
      const mediaW = 64 + Math.round(rand() * 26);   // 64%..90% of the column
      const gap    = 52 + Math.round(rand() * 44);   // 52..96px below each tile

      const thumb = document.createElement("div");
      thumb.className = "explore-thumb";
      thumb.dataset.project = pIdx;
      thumb.dataset.image   = iIdx;
      thumb.style.setProperty("--media-w", mediaW + "%");
      thumb.style.setProperty("--gap", gap + "px");

      // Images use tiny webp thumbs (gifs keep .gif to stay animated); videos
      // get a jpg poster so Low Power Mode / non-autoplay still shows a frame.
      const thumbExt = it.src.toLowerCase().endsWith(".gif") ? "gif"
                     : it.type === "video" ? "jpg"
                     : "webp";
      const thumbSrc = ("thumbs/" + it.src).replace(/\.[^.]+$/, "." + thumbExt);
      // Pre-resolved intrinsic dimensions so the browser reserves the
      // correct aspect-ratio box before the thumb loads — no masonry
      // reflow as items stream in.
      const dimsKey = thumbSrc.replace(/^thumbs\//, "");
      const wh = (window.THUMB_DIMS && window.THUMB_DIMS[dimsKey]) || null;
      const sz = wh ? ` width="${wh[0]}" height="${wh[1]}"` : "";
      const media = it.type === "video"
        ? (isMobileVid
            ? `<img src="${thumbSrc}"${sz} alt="${proj.name}" loading="lazy" decoding="async">`
            : `<video class="${it.scale ? "scaled" : ""}"${sz} muted ${it.start ? `data-start="${it.start}"` : "loop"} playsinline preload="none" data-poster="${thumbSrc}" data-lazy-video><source src="${it.src}" type="video/mp4"></video>`)
        : `<img src="${thumbSrc}"${sz} alt="${proj.name}" loading="lazy" decoding="async">`;

      thumb.innerHTML = `<div class="explore-thumb-media">${media}</div>`;

      thumb.addEventListener("click", () => {
        if (dragMoved) return;
        openModal(pIdx, iIdx);
      });
      thumb.addEventListener("mouseenter", () => showMeta(pIdx, iIdx));
      thumb.addEventListener("mouseleave", () => resetMeta());

      world.appendChild(thumb);

      const v = thumb.querySelector("video[data-lazy-video]");
      if (v && it.start) {
        const s = it.start;
        v.addEventListener("loadedmetadata", () => { try { v.currentTime = s; } catch (e) {} });
        v.addEventListener("ended", () => { try { v.currentTime = s; v.play(); } catch (e) {} });
      }
      return { thumb, v };
    }

    // Build the first FIRST_BATCH tiles synchronously (covers the first
    // screen so entrance paint is immediate), then chunk the rest into
    // requestIdleCallback so the main thread stays responsive.
    const FIRST_BATCH = 28;
    const CHUNK = 18;
    let cursor = 0;
    function renderNextChunk(size) {
      const end = Math.min(cursor + size, flatItems.length);
      const frag = document.createDocumentFragment();
      const tovid = [];
      for (; cursor < end; cursor++) {
        const { pIdx, iIdx, it } = flatItems[cursor];
        const { thumb, v } = buildTile(pIdx, iIdx, it, cursor);
        frag.appendChild(thumb);
        if (v) tovid.push({ v, tileIdx: cursor });
      }
      world.appendChild(frag);
      // Defer video observe a touch so first paint isn't competing.
      tovid.forEach(({ v, tileIdx }) => {
        if (videoIO) setTimeout(() => videoIO.observe(v), 200 + tileIdx * 10);
      });
      if (cursor < flatItems.length) {
        const next = () => renderNextChunk(CHUNK);
        if ("requestIdleCallback" in window) requestIdleCallback(next, { timeout: 200 });
        else setTimeout(next, 16);
      }
    }
    renderNextChunk(FIRST_BATCH);

    // ─── Nav indicator (shared) ────────────────────────────
    function bindIndicator(container, indicatorSelector, itemSelector, activeSelector) {
      if (!container) return;
      const indicator = container.querySelector(indicatorSelector);
      const items = [...container.querySelectorAll(itemSelector)];
      if (!indicator || items.length === 0) return;
      let activeItem = activeSelector ? container.querySelector(activeSelector) : null;
      function placeIndicator(item, color) {
        if (!item) return;
        const cb = container.getBoundingClientRect();
        const ib = item.getBoundingClientRect();
        const x = ib.left - cb.left + 4;
        const y = ib.top - cb.top + ib.height / 2;
        indicator.style.transform = `translate(${x}px, ${y}px) translateY(-50%)`;
        if (color) indicator.style.backgroundColor = color;
      }
      if (activeItem) placeIndicator(activeItem);
      requestAnimationFrame(() => indicator.classList.add("is-ready"));
      items.forEach((item) => {
        item.addEventListener("mouseenter", () => placeIndicator(item, "#8a8a8a"));
        item.addEventListener("focus",      () => placeIndicator(item, "#8a8a8a"));
      });
      container.addEventListener("mouseleave", () => {
        if (activeItem) placeIndicator(activeItem); else indicator.style.opacity = "0";
      });
      container.addEventListener("mouseenter", () => indicator.style.opacity = "1");
    }
    bindIndicator(document.querySelector("nav"), ".nav-indicator", "a", "a.active");

    // ─── Meta block (swap content on thumb hover) ─────────────
    const metaTitle   = document.getElementById("exploreMetaTitle");
    const metaDesc    = document.getElementById("exploreMetaDesc");
    const metaKind    = document.getElementById("exploreMetaKind");
    const metaCounter = document.getElementById("exploreMetaCounter");
    const DEFAULT_TITLE = metaTitle.textContent;
    const DEFAULT_DESC  = metaDesc.textContent;

    function showMeta(pIdx, iIdx) {
      const proj = projects[pIdx];
      const item = proj.items[iIdx];
      // Bar shows the PROJECT description; per-image labels live in the modal.
      metaTitle.textContent   = proj.name;
      metaDesc.textContent    = proj.desc || "";
      metaKind.textContent    = item.type === "video" ? "Video" : "Image";
      metaCounter.textContent = `${iIdx + 1} of ${proj.items.length}`;
    }
    function resetMeta() {
      metaTitle.textContent   = DEFAULT_TITLE;
      metaDesc.textContent    = DEFAULT_DESC;
      metaKind.textContent    = "";
      metaCounter.textContent = "";
    }

// ─── Modal: scoped to a single project's images ────────
    const modal        = document.getElementById("exploreModal");
    const modalMedia   = document.getElementById("exploreModalMedia");
    const modalTitle   = document.getElementById("exploreModalTitle");
    const modalDesc    = document.getElementById("exploreModalDesc");
    const modalCta     = document.getElementById("exploreModalCta");
    const modalClose   = document.getElementById("exploreModalClose");
    const modalPrev    = document.getElementById("exploreModalPrev");
    const modalNext    = document.getElementById("exploreModalNext");

    let curProj = 0;
    let curImg  = 0;

    function renderModal(pIdx, iIdx) {
      const proj = projects[pIdx];
      const item = proj.items[iIdx];
      curProj = pIdx; curImg = iIdx;
      const media = item.type === "video"
        ? `<video class="${item.scale ? "scaled" : ""}" autoplay ${item.sound ? "" : "muted"} ${item.start ? "" : "loop"} playsinline preload="auto" controls><source src="${item.src}" type="video/mp4"></video>`
        : `<img src="${item.src}" alt="${proj.name}">`;
      modalMedia.innerHTML = media;
      if (item.type === "video" && item.start) {
        const mv = modalMedia.querySelector("video");
        const s = item.start;
        mv.addEventListener("loadedmetadata", () => { try { mv.currentTime = s; } catch (e) {} });
        mv.addEventListener("ended", () => { try { mv.currentTime = s; mv.play(); } catch (e) {} });
      }
      modalTitle.textContent = proj.name;
      modalDesc.textContent  = item.label || proj.desc || "";
      if (proj.href) {
        modalCta.href = proj.href;
        modalCta.style.display = "inline";
      } else {
        modalCta.style.display = "none";
      }
    }

    function openModal(pIdx, iIdx) {
      renderModal(pIdx, iIdx);
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }
    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      // Stop any playing video before tearing it down
      const v = modalMedia.querySelector("video");
      if (v) { try { v.pause(); } catch (e) {} }
      // Clear after the fade-out so we don't see a blank flash mid-transition
      setTimeout(() => { modalMedia.innerHTML = ""; }, 240);
      document.body.style.overflow = "";
    }
    function nextItem() {
      const n = projects[curProj].items.length;
      renderModal(curProj, (curImg + 1) % n);
    }
    function prevItem() {
      const n = projects[curProj].items.length;
      renderModal(curProj, (curImg - 1 + n) % n);
    }

    modalClose.addEventListener("click", closeModal);
    modalNext.addEventListener("click", nextItem);
    modalPrev.addEventListener("click", prevItem);
    document.addEventListener("keydown", (e) => {
      if (!modal.classList.contains("is-open")) return;
      if (e.key === "Escape")     closeModal();
      if (e.key === "ArrowRight") nextItem();
      if (e.key === "ArrowLeft")  prevItem();
    });
  </script>

  <script src="../nav.js?v=2" defer></script>
