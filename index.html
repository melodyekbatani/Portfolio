<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melody Ekbatani</title>
  <link rel="stylesheet" href="style.css?v=10">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body>

  <nav>
    <span class="nav-indicator" aria-hidden="true"></span>
    <a href="/" class="t-small active">Home</a>
    <a href="#work" class="t-small">Work</a>
    <a href="about.html" class="t-small">About</a>
    <a href="explore.html" class="t-small">Explore</a>
    <a href="#" class="t-small" target="_blank">Resume <i class="ph ph-arrow-up-right"></i></a>
  </nav>

  <main class="rail">

    <section class="hero">
      <div class="hero-name">
        <h1 class="t-display">Melody Ekbatani</h1>
      </div>
      <div class="hero-bottom">

        <div class="hero-year"></div>

        <div class="hero-bio">
          <p class="t-small">Get to know me</p>
          <p class="t-body">Product designer interested in emerging interaction models and ai systems, with a background in architecture and innovation.</p>
          <div class="hero-links">
            <a href="https://linkedin.com/in/melodyekbatani" target="_blank" class="t-body">
              Connect on linkedin <i class="ph ph-arrow-up-right"></i>
            </a>
            <a href="mailto:melodyekbatani@gmail.com" class="t-body">
              melodyekbatani@gmail.com <i class="ph ph-arrow-square-out"></i>
            </a>
          </div>
        </div>

        <div class="hero-thumb">
          <p class="t-small">A glimpse of my work</p>
          <div class="hero-thumb-media">
            <video autoplay muted loop playsinline>
              <source src="Header reel.mp4" type="video/mp4">
            </video>
          </div>
        </div>

      </div>
    </section>

  </main>

  <script>
    const nav = document.querySelector("nav");
    const indicator = nav?.querySelector(".nav-indicator");
    const navLinks = nav ? [...nav.querySelectorAll("a")] : [];
    const activeLink = nav?.querySelector("a.active");

    function placeIndicator(link, isHover = false) {
      if (!nav || !indicator || !link) return;

      const navBox = nav.getBoundingClientRect();
      const linkBox = link.getBoundingClientRect();
      const x = linkBox.left - navBox.left + 4;
      const y = linkBox.top - navBox.top + linkBox.height / 2;

      indicator.style.transform = `translate(${x}px, ${y}px) translateY(-50%)`;
      indicator.style.backgroundColor = isHover ? "#CFCFCF" : "#111111";
    }

    if (activeLink) {
      placeIndicator(activeLink);
      requestAnimationFrame(() => indicator?.classList.add("is-ready"));
    }

    navLinks.forEach((link) => {
      link.addEventListener("mouseenter", () => placeIndicator(link, true));
      link.addEventListener("focus", () => placeIndicator(link, true));
    });

    nav?.addEventListener("mouseleave", () => placeIndicator(activeLink));
    nav?.addEventListener("focusout", (event) => {
      if (!nav.contains(event.relatedTarget)) {
        placeIndicator(activeLink);
      }
    });

    window.addEventListener("resize", () => placeIndicator(activeLink));
  </script>

</body>
</html>
